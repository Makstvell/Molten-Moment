<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Molten Moment</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
    #canvas { width:100%; height:100%; display:block; }
    #ui {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; gap:6px; align-items:center;
      background:rgba(0,0,0,0.72); backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1); border-radius:16px;
      padding:10px 16px; z-index:10; max-width:96vw;
    }
    .row { display:flex; gap:7px; align-items:center; flex-wrap:wrap; justify-content:center; }
    button, select {
      background:rgba(255,255,255,0.08); color:#ddd;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:8px; padding:5px 11px; cursor:pointer; font-size:12px;
    }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    button:hover:not(:disabled) { background:rgba(255,255,255,0.17); }
    input[type="range"] { cursor:pointer; accent-color:#ffaa44; }
    input[type="number"] {
      background:rgba(255,255,255,0.08); color:#ddd;
      border:1px solid rgba(255,255,255,0.15); border-radius:6px;
      padding:4px 6px; font-size:12px; width:58px; text-align:center;
    }
    input[type="file"] { display:none; }
    #fileBtn { background:rgba(255,255,255,0.08); color:#ddd; border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:5px 11px; cursor:pointer; font-size:12px; }
    #fileBtn:hover { background:rgba(255,255,255,0.17); }
    #fileName { color:#aaa; font-size:12px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    label { display:flex; gap:5px; align-items:center; color:#ccc; font-size:12px; }
    .tag { padding:4px 9px; border-radius:6px; background:rgba(255,150,40,0.12);
           border:1px solid rgba(255,150,40,0.25); color:#ffaa44; font-size:11px; white-space:nowrap; }
    .sep { width:1px; height:18px; background:rgba(255,255,255,0.12); }
    #customRes { display:none; gap:4px; align-items:center; color:#aaa; font-size:12px; }
    #exportFull { border-color:rgba(255,160,50,0.4); color:#ffb850; }
    #exportFull:hover:not(:disabled) { background:rgba(255,160,50,0.15); }
    #seekBar { width:160px; }
    #timeDisp { color:#999; font-size:11px; white-space:nowrap; min-width:72px; }
    #fromSlider, #toSlider { width:90px; }
    .tdisp { color:#ffaa44; font-size:11px; min-width:32px; }
    #progressWrap { display:none; width:220px; }
    #progressTrack { width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
    #progressBar { height:100%; width:0%; background:#ffaa44; transition:width 0.15s linear; }
    #progressLabel { color:#aaa; font-size:11px; text-align:center; margin-top:3px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="row">
    <input id="file" type="file" accept=".mp3,.wav,.flac,.ogg,.aac,.m4a,.opus,.weba,audio/*" />
    <button id="fileBtn" type="button">&#128193; Choose file</button>
    <span id="fileName">Moment</span>
    <div class="sep"></div>
    <button id="play"    disabled>&#9654; Play</button>
    <button id="pause"   disabled>&#9646;&#9646; Pause</button>
    <button id="restart" disabled>&#9646;&#9664; Restart</button>
    <input  id="seekBar" type="range" min="0" max="100" value="0" step="0.1" disabled />
    <span   id="timeDisp">0:00 / 0:00</span>
    <div class="sep"></div>
    <label>Sens <input id="sens" type="range" min="0.5" max="3" value="0.5" step="0.05"/> <span id="sensVal">0.50</span></label>
    <label>Glow <input id="glow" type="range" min="0" max="1" value="0.3" step="0.01"/> <span id="glowVal">0.30</span></label>
  </div>
  <div class="row">
    <span class="tag" id="status">No audio loaded</span>
    <div class="sep"></div>
    <label>From
      <input id="fromSlider" type="range" min="0" max="100" value="0" step="1" disabled />
      <span id="fromDisp" class="tdisp">0:00</span>
    </label>
    <label>To
      <input id="toSlider" type="range" min="0" max="100" value="100" step="1" disabled />
      <span id="toDisp" class="tdisp">0:00</span>
    </label>
    <div class="sep"></div>
    <label>Resolution
      <select id="resPreset">
        <option value="720">1280 × 720 (HD)</option>
        <option value="1080" selected>1920 × 1080 (Full HD)</option>
        <option value="portrait">1080 × 1920 (Portrait)</option>
        <option value="1440">2560 × 1440 (2K)</option>
        <option value="4k">3840 × 2160 (4K)</option>
        <option value="custom">Custom…</option>
      </select>
    </label>
    <div id="customRes">
      <input id="resW" type="number" value="1920" min="100" max="7680" />
      <span style="color:#666">×</span>
      <input id="resH" type="number" value="1080" min="100" max="4320" />
      <span style="color:#666;font-size:11px">px</span>
    </div>
    <div class="sep"></div>
    <button id="exportFull" disabled>&#9654; Export Video</button>
    <span class="tag" id="recInfo">Idle</span>
  </div>
  <div id="progressWrap">
    <div id="progressTrack"><div id="progressBar"></div></div>
    <div id="progressLabel">0%</div>
  </div>
</div>
<script>
(() => {
// ── Shared constants (blob reference world) ──────────────────────────────────
const REF_W = 1920, REF_H = 1080;
const BLOB_COUNT = 20;

// ── Worker code (runs export in background) ──────────────────────────────────
const WORKER_SRC = `
const REF_W = 1920, REF_H = 1080, BLOB_COUNT = 20;
const blobs = [];

function rand(a,b){ return a+Math.random()*(b-a); }

function resetBlobs(){
  blobs.length=0;
  const minR=Math.min(REF_W,REF_H)*0.05, maxR=Math.min(REF_W,REF_H)*0.12;
  const cols=Math.ceil(Math.sqrt(BLOB_COUNT*REF_W/REF_H)), rows=Math.ceil(BLOB_COUNT/cols);
  const cw=REF_W/cols, ch=REF_H/rows;
  let idx=0;
  for(let r=0;r<rows&&idx<BLOB_COUNT;r++)
    for(let c=0;c<cols&&idx<BLOB_COUNT;c++,idx++)
      blobs.push({x:cw*(c+0.5)+rand(-cw*.25,cw*.25),y:ch*(r+0.5)+rand(-ch*.25,ch*.25),
        vx:rand(-.3,.3),vy:rand(-.5,.5),r:rand(minR,maxR),
        heat:rand(0,1),phase:rand(0,Math.PI*2),swayFreq:rand(.3,.9)});
}

function stepPhysics(dt,kick){
  const hot=REF_H*0.15, cold=REF_H*0.15;
  for(const b of blobs){
    if(b.y>REF_H-hot) b.heat=Math.min(1,b.heat+1.8*dt);
    else if(b.y<cold)  b.heat=Math.max(0,b.heat-1.4*dt);
    b.vy-=(b.heat-0.45)*2.2*70*dt;
    b.phase+=dt*b.swayFreq;
    b.vx+=Math.sin(b.phase)*14*dt+Math.sin(b.phase*1.7+1.2)*5*dt;
    b.vy-=kick*40*dt*b.heat;
    b.vx+=(Math.random()-.5)*kick*10*dt;
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy), maxSpd=70+80*kick;
    if(spd>maxSpd){b.vx*=maxSpd/spd;b.vy*=maxSpd/spd;}
    const damp=Math.pow(0.88,dt*60); b.vx*=damp; b.vy*=damp;
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    if(b.x<-b.r) b.x=REF_W+b.r; if(b.x>REF_W+b.r) b.x=-b.r;
    if(b.y<-b.r){b.y=-b.r;b.vy=Math.abs(b.vy)*.4;b.heat=0;}
    if(b.y>REF_H+b.r){b.y=REF_H+b.r;b.vy=-Math.abs(b.vy)*.4;b.heat=1;}
  }
  for(let i=0;i<blobs.length;i++)
    for(let j=i+1;j<blobs.length;j++){
      const bi=blobs[i],bj=blobs[j],dx=bj.x-bi.x,dy=bj.y-bi.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+0.001, minD=(bi.r+bj.r)*1.9;
      if(dist<minD){const f=((minD-dist)/minD)*55,nx=dx/dist,ny=dy/dist;
        bi.vx-=nx*f*dt;bi.vy-=ny*f*dt;bj.vx+=nx*f*dt;bj.vy+=ny*f*dt;}
    }
}

function sampleField(px,py,energy){
  let field=0,wT=0,wH=0;
  for(const b of blobs){
    const dx=px-b.x,dy=py-b.y,rr=b.r*(0.8+0.65*energy),d2=dx*dx+dy*dy+1e-6;
    const c=(rr*rr)/d2; field+=c; wT+=c; wH+=c*b.heat;
  }
  return [field, wT>0?wH/wT:0.5];
}

function blobColor(heat,t){
  let r,g,b;
  if(heat<0.5){const s=heat*2;r=100+130*s;g=12+68*s;b=5+5*s;}
  else{const s=(heat-.5)*2;r=230+25*s;g=80+160*s;b=10+140*s;}
  r+=(255-r)*t*0.45*heat; g+=(255-g)*t*0.35*heat;
  return[Math.min(255,r),Math.min(255,g),Math.min(255,b)];
}

function computeFFT(samples){
  const n=samples.length, re=new Float32Array(samples), im=new Float32Array(n);
  for(let i=1,j=0;i<n;i++){
    let bit=n>>1; for(;j&bit;bit>>=1)j^=bit; j^=bit;
    if(i<j){let t=re[i];re[i]=re[j];re[j]=t; t=im[i];im[i]=im[j];im[j]=t;}
  }
  for(let len=2;len<=n;len<<=1){
    const ang=-2*Math.PI/len, wr=Math.cos(ang), wi=Math.sin(ang);
    for(let i=0;i<n;i+=len){
      let ur=1,ui=0;
      for(let k=0;k<(len>>1);k++){
        const oi=i+k+(len>>1);
        const tr=re[oi]*ur-im[oi]*ui, ti=re[oi]*ui+im[oi]*ur;
        re[oi]=re[i+k]-tr; im[oi]=im[i+k]-ti;
        re[i+k]+=tr; im[i+k]+=ti;
        const nu=ur*wr-ui*wi; ui=ur*wi+ui*wr; ur=nu;
      }
    }
  }
  const mag=new Float32Array(n>>1);
  for(let i=0;i<(n>>1);i++) mag[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i])/n;
  return mag;
}

function rmsR(a,s,e){let v=0; for(let i=s;i<e;i++)v+=a[i]*a[i]; return Math.sqrt(v/(e-s));}

// Matches AnalyserNode.getByteFrequencyData() scale:
// mag → dB → [0,1] using minDecibels=-100, maxDecibels=-30
function magToNorm(linMag){
  const dB=20*Math.log10(Math.max(linMag,1e-10));
  return Math.max(0,Math.min(1,(dB+100)/70));
}

function analyseFrames(ch0, ch1, sr, t0, t1, fps){
  const N=2048;
  // Correct bin ranges: bin k → frequency k*sr/N
  const be=Math.max(1,Math.floor(200*N/sr));   // ~9 bins @44.1kHz
  const me=Math.floor(3000*N/sr);              // ~139 bins @44.1kHz
  const win=new Float32Array(N), out=[];
  const SM=0.6;
  let prevSpec=null;

  function processWindow(centerSample){
    for(let i=0;i<N;i++){
      const si=centerSample-(N>>1)+i;
      const s=(si>=0&&si<ch0.length)?(ch0[si]+ch1[si])*.5:0;
      win[i]=s*(.5-.5*Math.cos(2*Math.PI*i/(N-1)));
    }
    const raw=computeFFT(win);
    const spec=new Float32Array(raw.length);
    for(let i=0;i<raw.length;i++){
      const lin=raw[i]*N;
      spec[i]=prevSpec ? prevSpec[i]*SM+lin*(1-SM) : lin;
    }
    prevSpec=spec;
    return spec;
  }

  // Warm-up: prime the temporal smoother 2s before t0
  const wt0=Math.max(0, t0-2);
  const warmFc=Math.ceil((t0-wt0)*fps);
  for(let fi=0;fi<warmFc;fi++) processWindow(Math.floor((wt0+fi/fps)*sr));

  // Actual frames
  const fc=Math.ceil((t1-t0)*fps);
  for(let fi=0;fi<fc;fi++){
    const spec=processWindow(Math.floor((t0+fi/fps)*sr));
    const norm=new Float32Array(spec.length);
    for(let i=0;i<spec.length;i++) norm[i]=magToNorm(spec[i]);
    out.push({
      bass:rmsR(norm,1,be),
      mid: rmsR(norm,be,me),
      high:rmsR(norm,me,norm.length),
      full:rmsR(norm,1,norm.length),
    });
  }
  return out;
}

function renderFrame(outCtx,compCtx,pxCtx,pw,ph,scale,w,h,energy,glow,eB,eM,eF,tn){
  const thr=1.05+0.85*(1-energy), soft=thr*0.45;
  const cx=w/2, cy=h/2;
  const ds=Math.max(2,Math.round(h/380));
  const img=pxCtx.createImageData(pw,ph), data=img.data;
  for(let piy=0;piy<ph;piy++)
    for(let pix=0;pix<pw;pix++){
      const wx=(pix*ds-cx)/scale+REF_W/2;
      const wy=(piy*ds-cy)/scale+REF_H/2;
      const [f,heat]=sampleField(wx,wy,energy);
      const idx=(piy*pw+pix)*4;
      if(f>=thr-soft){
        const t=Math.max(0,Math.min(1,(f-(thr-soft))/(soft*2)));
        const [r,g,b]=blobColor(heat,t);
        data[idx]=r;data[idx+1]=g;data[idx+2]=b;data[idx+3]=Math.round(t*255);
      } else data[idx+3]=0;
    }
  pxCtx.putImageData(img,0,0);
  compCtx.clearRect(0,0,w,h);
  compCtx.imageSmoothingEnabled=true; compCtx.imageSmoothingQuality='high';
  compCtx.drawImage(pxCtx.canvas,0,0,w,h);
  const bg=outCtx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#040208'); bg.addColorStop(.5,'#080414'); bg.addColorStop(1,'#100306');
  outCtx.fillStyle=bg; outCtx.fillRect(0,0,w,h);
  outCtx.save(); outCtx.globalCompositeOperation='source-over'; outCtx.drawImage(compCtx.canvas,0,0);
  if(glow>0.01){
    outCtx.globalCompositeOperation='lighter';
    outCtx.filter='blur('+Math.round(8+14*glow)+'px)'; outCtx.globalAlpha=.55*glow; outCtx.drawImage(compCtx.canvas,0,0);
    outCtx.filter='blur('+Math.round(22+28*glow)+'px)'; outCtx.globalAlpha=.28*glow; outCtx.drawImage(compCtx.canvas,0,0);
    outCtx.filter='blur('+Math.round(50+20*glow)+'px)'; outCtx.globalAlpha=.10*glow; outCtx.drawImage(compCtx.canvas,0,0);
    outCtx.filter='none'; outCtx.globalAlpha=1;
  }
  outCtx.restore();
  outCtx.save(); outCtx.globalCompositeOperation='multiply';
  const vg=outCtx.createRadialGradient(w*.5,h*.5,Math.min(w,h)*.18,w*.5,h*.5,Math.max(w,h)*.78);
  vg.addColorStop(0,'rgba(255,255,255,1)'); vg.addColorStop(1,'rgba(0,0,0,1)');
  outCtx.fillStyle=vg; outCtx.fillRect(0,0,w,h); outCtx.restore();
  const fs=Math.min(w*.11,h*.17);
  outCtx.save(); outCtx.translate(w*.5,h*.5); outCtx.scale(1+0.06*eB,1+0.06*eB);
  outCtx.textAlign='center'; outCtx.textBaseline='middle';
  outCtx.font='300 '+fs+'px Georgia,serif';
  outCtx.shadowColor='rgba(255,140,30,'+(0.5+0.3*eB)+')'; outCtx.shadowBlur=60+40*eB;
  outCtx.fillStyle='rgba(255,230,180,0.12)'; outCtx.fillText(tn,0,0);
  outCtx.shadowColor='rgba(255,200,80,'+(0.7+0.2*eM)+')'; outCtx.shadowBlur=25+15*eM;
  outCtx.fillStyle='rgba(255,245,220,'+(0.7+0.2*eF)+')'; outCtx.fillText(tn,0,0);
  outCtx.shadowBlur=0; outCtx.fillStyle='rgba(255,255,252,'+(0.92+0.08*eF)+')'; outCtx.fillText(tn,0,0);
  outCtx.restore();
}

self.onmessage = async (e) => {
  // rawPCM / audioPCM decoded & resampled on main thread (Web Audio not in Workers)
  const {rawPCM, audioPCM, t0, t1, fps, rw, rh, sensitivity, glow, trackName, blobState, initEnv} = e.data;
  const {ch0: rCh0, ch1: rCh1, sampleRate: rawSR} = rawPCM;
  const {ch0: aCh0, ch1: aCh1, sampleRate: TARGET_SR, nch, length: audioLen} = audioPCM;
  const prog = (pct,label) => self.postMessage({type:'progress',pct,label});
  try {
    prog(2,'Loading muxer...');
    const {Muxer, ArrayBufferTarget} = await import('https://esm.sh/webm-muxer');

    prog(8,'Analysing audio...');
    const frames = analyseFrames(rCh0, rCh1||rCh0, rawSR, t0, t1, fps);
    const total  = frames.length;

    let vcodec='vp8', webmVC='V_VP8';
    for(const c of ['vp09.00.41.08','vp09.00.10.08']){
      try{const s=await VideoEncoder.isConfigSupported({codec:c,width:rw,height:rh,bitrate:8e6,framerate:fps});
        if(s.supported){vcodec=c;webmVC='V_VP9';break;}}catch{}
    }

    const mxTarget = new ArrayBufferTarget();
    const muxer = new Muxer({
      target:mxTarget,
      video:{codec:webmVC,width:rw,height:rh,frameRate:fps},
      audio:{codec:'A_OPUS',sampleRate:TARGET_SR,numberOfChannels:nch},
      firstTimestampBehavior:'offset',
    });

    const vEnc = new VideoEncoder({
      output:(c,m)=>muxer.addVideoChunk(c,m),
      error:e=>self.postMessage({type:'error',message:'Video: '+e.message}),
    });
    vEnc.configure({codec:vcodec,width:rw,height:rh,bitrate:8_000_000,framerate:fps,latencyMode:'quality'});

    const aEnc = new AudioEncoder({
      output:(c,m)=>muxer.addAudioChunk(c,m),
      error:e=>self.postMessage({type:'error',message:'Audio: '+e.message}),
    });
    aEnc.configure({codec:'opus',sampleRate:TARGET_SR,numberOfChannels:nch,bitrate:192_000});

    // Encode audio (pre-resampled Float32Arrays from main thread)
    const a1 = aCh1 || aCh0;
    for(let i=0;i<audioLen;i+=8192){
      const n=Math.min(8192,audioLen-i);
      const buf=new Float32Array(n*nch);
      for(let j=0;j<n;j++) buf[j]=aCh0[i+j]||0;
      if(nch>1) for(let j=0;j<n;j++) buf[n+j]=a1[i+j]||0;
      const ad=new AudioData({format:'f32-planar',sampleRate:TARGET_SR,
        numberOfFrames:n,numberOfChannels:nch,timestamp:Math.round(i/TARGET_SR*1e6),data:buf});
      aEnc.encode(ad); ad.close();
    }

    // Render frames
    if(blobState){ blobs.length=0; blobState.forEach(b=>blobs.push({...b})); }
    else resetBlobs();
    let eB=initEnv?initEnv.eB:0, eM=initEnv?initEnv.eM:0, eH=initEnv?initEnv.eH:0, eF=initEnv?initEnv.eF:0;
    const ds=Math.max(2,Math.round(rh/380));
    const pw=Math.ceil(rw/ds), ph=Math.ceil(rh/ds);
    const scale=Math.max(rw/REF_W, rh/REF_H);
    const outC=new OffscreenCanvas(rw,rh); const outCtx=outC.getContext('2d',{alpha:false});
    const cmpC=new OffscreenCanvas(rw,rh); const cmpCtx=cmpC.getContext('2d');
    const pxC =new OffscreenCanvas(pw,ph); const pxCtx=pxC.getContext('2d',{willReadFrequently:true});

    for(let fi=0;fi<total;fi++){
      const {bass,mid,high,full}=frames[fi]; const sm=0.09;
      eB+=(bass-eB)*sm; eM+=(mid-eM)*sm; eH+=(high-eH)*sm; eF+=(full-eF)*sm;
      const kick=Math.min(1,eB*2.8*sensitivity);
      const energy=Math.min(1,eF*2.2*sensitivity);
      stepPhysics(1/fps, kick);
      renderFrame(outCtx,cmpCtx,pxCtx,pw,ph,scale,rw,rh,energy,glow,eB,eM,eF,trackName);
      const ts=Math.round(fi*1e6/fps);
      const frame=new VideoFrame(outC,{timestamp:ts,duration:Math.round(1e6/fps)});
      vEnc.encode(frame,{keyFrame:fi%60===0}); frame.close();
      if(fi%20===0){
        prog(15+Math.round(fi/total*78), 'Rendering '+Math.round(fi/total*100)+'%...');
        if(vEnc.encodeQueueSize>40) await vEnc.flush();
      }
    }

    prog(95,'Finalising...'); await vEnc.flush(); await aEnc.flush(); muxer.finalize();
    self.postMessage({type:'done', buffer:mxTarget.buffer}, [mxTarget.buffer]);
  } catch(err) {
    self.postMessage({type:'error', message:err.message+' // '+err.stack});
  }
};
`;

const workerUrl = URL.createObjectURL(new Blob([WORKER_SRC], {type:'text/javascript'}));

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');

function createTarget(w, h, out) {
  const ds=Math.max(2,Math.round(h/380));
  const pw=Math.ceil(w/ds), ph=Math.ceil(h/ds);
  out.width=w; out.height=h;
  const outCtx=out.getContext('2d',{alpha:false});
  const off=document.createElement('canvas'); off.width=w; off.height=h;
  const offCtx=off.getContext('2d');
  const px=document.createElement('canvas'); px.width=pw; px.height=ph;
  const pxCtx=px.getContext('2d',{willReadFrequently:true});
  return {w,h,ds,out,outCtx,off,offCtx,px,pxCtx};
}

let displayTarget = null;
function resize() {
  const dpr=Math.min(window.devicePixelRatio||1,2);
  displayTarget=createTarget(Math.floor(canvas.clientWidth*dpr), Math.floor(canvas.clientHeight*dpr), canvas);
  resetBlobs();
}
window.addEventListener('resize', resize);

// ── UI ────────────────────────────────────────────────────────────────────────
const fileEl      = document.getElementById('file');
const fileBtnEl   = document.getElementById('fileBtn');
const fileNameEl  = document.getElementById('fileName');
const playBtn     = document.getElementById('play');
const pauseBtn    = document.getElementById('pause');
const restartBtn  = document.getElementById('restart');
const seekBarEl   = document.getElementById('seekBar');
const timeDispEl  = document.getElementById('timeDisp');
const statusEl    = document.getElementById('status');
const sensEl      = document.getElementById('sens');
const sensValEl   = document.getElementById('sensVal');
const glowEl      = document.getElementById('glow');
const glowValEl   = document.getElementById('glowVal');
const fromSlider  = document.getElementById('fromSlider');
const fromDisp    = document.getElementById('fromDisp');
const toSlider    = document.getElementById('toSlider');
const toDisp      = document.getElementById('toDisp');
const exportBtn   = document.getElementById('exportFull');
const recInfoEl   = document.getElementById('recInfo');
const resPreset   = document.getElementById('resPreset');
const customResEl = document.getElementById('customRes');
const resWEl      = document.getElementById('resW');
const resHEl      = document.getElementById('resH');
const progressWrap= document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressLbl = document.getElementById('progressLabel');

fileBtnEl.addEventListener('click', () => fileEl.click());
sensEl.addEventListener('input', () => sensValEl.textContent=(+sensEl.value).toFixed(2));
glowEl.addEventListener('input', () => glowValEl.textContent=(+glowEl.value).toFixed(2));

const PRESETS={'720':[1280,720],'1080':[1920,1080],'portrait':[1080,1920],'1440':[2560,1440],'4k':[3840,2160]};
resPreset.addEventListener('change', () => {
  const p=PRESETS[resPreset.value];
  customResEl.style.display=p?'none':'flex';
  if(p){resWEl.value=p[0];resHEl.value=p[1];}
});
function getRecordSize(){ return [Math.max(100,+resWEl.value),Math.max(100,+resHEl.value)]; }

function fmt(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+':'+(''+(s%60)).padStart(2,'0'); }

let seekDragging=false;
seekBarEl.addEventListener('mousedown', ()=>{ seekDragging=true; });
seekBarEl.addEventListener('mouseup',   ()=>{ seekDragging=false; if(audioEl) audioEl.currentTime=+seekBarEl.value; });
seekBarEl.addEventListener('touchend',  ()=>{ seekDragging=false; if(audioEl) audioEl.currentTime=+seekBarEl.value; });
setInterval(()=>{
  if(!audioEl) return;
  if(!seekDragging) seekBarEl.value=audioEl.currentTime;
  timeDispEl.textContent=fmt(audioEl.currentTime)+' / '+fmt(audioEl.duration||0);
}, 250);

fromSlider.addEventListener('input',()=>{
  if(+fromSlider.value>=+toSlider.value) fromSlider.value=+toSlider.value-1;
  fromDisp.textContent=fmt(+fromSlider.value);
});
toSlider.addEventListener('input',()=>{
  if(+toSlider.value<=+fromSlider.value) toSlider.value=+fromSlider.value+1;
  toDisp.textContent=fmt(+toSlider.value);
});

function initTimeControls(dur){
  const d=Math.floor(dur);
  seekBarEl.max=dur; seekBarEl.value=0;
  fromSlider.max=d; fromSlider.value=0;
  toSlider.max=d; toSlider.value=d;
  fromDisp.textContent='0:00'; toDisp.textContent=fmt(d);
  seekBarEl.disabled=fromSlider.disabled=toSlider.disabled=false;
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let trackName='Moment';
let audioCtx, audioEl, srcNode, analyser, aBass, aMid, aHigh, freqData;
let envBass=0, envMid=0, envHigh=0, envFull=0;

function ensureAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function rms(a){
  const arr=new Uint8Array(a.frequencyBinCount); a.getByteFrequencyData(arr);
  let s=0; for(let i=0;i<arr.length;i++){const v=arr[i]/255;s+=v*v;} return Math.sqrt(s/arr.length);
}

function setupAudio(el){
  const ac=ensureAC();
  try{srcNode?.disconnect();}catch{}
  srcNode=ac.createMediaElementSource(el);
  analyser=ac.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.75;
  const bF=ac.createBiquadFilter(); bF.type='lowpass';  bF.frequency.value=200;
  const mF=ac.createBiquadFilter(); mF.type='bandpass'; mF.frequency.value=1000; mF.Q.value=0.8;
  const hF=ac.createBiquadFilter(); hF.type='highpass'; hF.frequency.value=3000;
  aBass=ac.createAnalyser(); aBass.fftSize=1024; aBass.smoothingTimeConstant=0.6;
  aMid =ac.createAnalyser(); aMid.fftSize =1024; aMid.smoothingTimeConstant=0.6;
  aHigh=ac.createAnalyser(); aHigh.fftSize=1024; aHigh.smoothingTimeConstant=0.6;
  srcNode.connect(analyser);
  srcNode.connect(bF); bF.connect(aBass);
  srcNode.connect(mF); mF.connect(aMid);
  srcNode.connect(hF); hF.connect(aHigh);
  analyser.connect(ac.destination);
  freqData=new Uint8Array(analyser.frequencyBinCount);
  playBtn.disabled=pauseBtn.disabled=restartBtn.disabled=exportBtn.disabled=false;
}

function onTrackReady(name){
  statusEl.textContent='Loaded: '+name;
  const go=()=>{ if(audioEl.duration&&isFinite(audioEl.duration)) initTimeControls(audioEl.duration);
    else audioEl.addEventListener('durationchange',()=>initTimeControls(audioEl.duration),{once:true}); };
  go();
}

fileEl.addEventListener('change',()=>{
  const f=fileEl.files?.[0]; if(!f) return;
  const url=URL.createObjectURL(f);
  if(audioEl){try{audioEl.pause();}catch{} audioEl.src='';}
  audioEl=new Audio(); audioEl.crossOrigin='anonymous'; audioEl.src=url;
  audioEl.addEventListener('canplay',()=>{
    setupAudio(audioEl);
    trackName=f.name.replace(/\.[^.]+$/,'');
    fileNameEl.textContent=trackName;
    onTrackReady(trackName);
  },{once:true});
  audioEl.addEventListener('ended',()=>{ statusEl.textContent='Ended'; });
});

playBtn.addEventListener('click', async()=>{
  const ac=ensureAC(); if(ac.state!=='running') await ac.resume();
  await audioEl?.play(); statusEl.textContent='Playing';
});
pauseBtn.addEventListener('click',()=>{ audioEl?.pause(); statusEl.textContent='Paused'; });
restartBtn.addEventListener('click', async()=>{
  if(!audioEl) return;
  const ac=ensureAC(); if(ac.state!=='running') await ac.resume();
  audioEl.currentTime=0; await audioEl.play(); statusEl.textContent='Playing';
});

// ── Blobs (main thread — REF coordinate space) ────────────────────────────────
const blobs=[];
function rand(a,b){ return a+Math.random()*(b-a); }

function resetBlobs(){
  blobs.length=0;
  const minR=Math.min(REF_W,REF_H)*0.05, maxR=Math.min(REF_W,REF_H)*0.12;
  const cols=Math.ceil(Math.sqrt(BLOB_COUNT*REF_W/REF_H)), rows=Math.ceil(BLOB_COUNT/cols);
  const cw=REF_W/cols, ch=REF_H/rows;
  let idx=0;
  for(let r=0;r<rows&&idx<BLOB_COUNT;r++)
    for(let c=0;c<cols&&idx<BLOB_COUNT;c++,idx++)
      blobs.push({x:cw*(c+0.5)+rand(-cw*.25,cw*.25),y:ch*(r+0.5)+rand(-ch*.25,ch*.25),
        vx:rand(-.3,.3),vy:rand(-.5,.5),r:rand(minR,maxR),
        heat:rand(0,1),phase:rand(0,Math.PI*2),swayFreq:rand(.3,.9)});
}

function stepPhysics(dt,kick){
  const hot=REF_H*0.15, cold=REF_H*0.15;
  for(const b of blobs){
    if(b.y>REF_H-hot) b.heat=Math.min(1,b.heat+1.8*dt);
    else if(b.y<cold)  b.heat=Math.max(0,b.heat-1.4*dt);
    b.vy-=(b.heat-0.45)*2.2*70*dt;
    b.phase+=dt*b.swayFreq;
    b.vx+=Math.sin(b.phase)*14*dt+Math.sin(b.phase*1.7+1.2)*5*dt;
    b.vy-=kick*40*dt*b.heat;
    b.vx+=(Math.random()-.5)*kick*10*dt;
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy), maxSpd=70+80*kick;
    if(spd>maxSpd){b.vx*=maxSpd/spd;b.vy*=maxSpd/spd;}
    const damp=Math.pow(0.88,dt*60); b.vx*=damp; b.vy*=damp;
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    if(b.x<-b.r) b.x=REF_W+b.r; if(b.x>REF_W+b.r) b.x=-b.r;
    if(b.y<-b.r){b.y=-b.r;b.vy=Math.abs(b.vy)*.4;b.heat=0;}
    if(b.y>REF_H+b.r){b.y=REF_H+b.r;b.vy=-Math.abs(b.vy)*.4;b.heat=1;}
  }
  for(let i=0;i<blobs.length;i++)
    for(let j=i+1;j<blobs.length;j++){
      const bi=blobs[i],bj=blobs[j],dx=bj.x-bi.x,dy=bj.y-bi.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+0.001, minD=(bi.r+bj.r)*1.9;
      if(dist<minD){const f=((minD-dist)/minD)*55,nx=dx/dist,ny=dy/dist;
        bi.vx-=nx*f*dt;bi.vy-=ny*f*dt;bj.vx+=nx*f*dt;bj.vy+=ny*f*dt;}
    }
}

// ── Field & color ─────────────────────────────────────────────────────────────
function sampleField(px,py,energy){
  let field=0,wT=0,wH=0;
  for(const b of blobs){
    const dx=px-b.x,dy=py-b.y,rr=b.r*(0.8+0.65*energy),d2=dx*dx+dy*dy+1e-6;
    const c=(rr*rr)/d2; field+=c; wT+=c; wH+=c*b.heat;
  }
  return [field, wT>0?wH/wT:0.5];
}

function blobColor(heat,t){
  let r,g,b;
  if(heat<0.5){const s=heat*2;r=100+130*s;g=12+68*s;b=5+5*s;}
  else{const s=(heat-.5)*2;r=230+25*s;g=80+160*s;b=10+140*s;}
  r+=(255-r)*t*0.45*heat; g+=(255-g)*t*0.35*heat;
  return[Math.min(255,r),Math.min(255,g),Math.min(255,b)];
}

// ── Render (main thread — cover scaling from REF space) ───────────────────────
function renderToTarget(tgt, energy, glow){
  const {w,h,ds,outCtx,off,offCtx,px,pxCtx}=tgt;
  const pw=px.width, ph=px.height;
  // Cover: uniform scale so REF_W×REF_H fills the target; blobs may go off edge
  const scale=Math.max(w/REF_W, h/REF_H);
  const cx=w/2, cy=h/2;
  const img=pxCtx.createImageData(pw,ph), data=img.data;
  const thr=1.05+0.85*(1-energy), soft=thr*0.45;
  for(let piy=0;piy<ph;piy++)
    for(let pix=0;pix<pw;pix++){
      const wx=(pix*ds-cx)/scale+REF_W/2;
      const wy=(piy*ds-cy)/scale+REF_H/2;
      const [f,heat]=sampleField(wx,wy,energy);
      const idx=(piy*pw+pix)*4;
      if(f>=thr-soft){
        const t=Math.max(0,Math.min(1,(f-(thr-soft))/(soft*2)));
        const [r,g,b]=blobColor(heat,t);
        data[idx]=r;data[idx+1]=g;data[idx+2]=b;data[idx+3]=Math.round(t*255);
      } else data[idx+3]=0;
    }
  pxCtx.putImageData(img,0,0);
  offCtx.clearRect(0,0,w,h);
  offCtx.imageSmoothingEnabled=true; offCtx.imageSmoothingQuality='high';
  offCtx.drawImage(px,0,0,w,h);
  const bg=outCtx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#040208'); bg.addColorStop(.5,'#080414'); bg.addColorStop(1,'#100306');
  outCtx.fillStyle=bg; outCtx.fillRect(0,0,w,h);
  outCtx.save(); outCtx.globalCompositeOperation='source-over'; outCtx.drawImage(off,0,0);
  if(glow>0.01){
    outCtx.globalCompositeOperation='lighter';
    outCtx.filter='blur('+Math.round(8+14*glow)+'px)'; outCtx.globalAlpha=.55*glow; outCtx.drawImage(off,0,0);
    outCtx.filter='blur('+Math.round(22+28*glow)+'px)'; outCtx.globalAlpha=.28*glow; outCtx.drawImage(off,0,0);
    outCtx.filter='blur('+Math.round(50+20*glow)+'px)'; outCtx.globalAlpha=.10*glow; outCtx.drawImage(off,0,0);
    outCtx.filter='none'; outCtx.globalAlpha=1;
  }
  outCtx.restore();
  outCtx.save(); outCtx.globalCompositeOperation='multiply';
  const vg=outCtx.createRadialGradient(w*.5,h*.5,Math.min(w,h)*.18,w*.5,h*.5,Math.max(w,h)*.78);
  vg.addColorStop(0,'rgba(255,255,255,1)'); vg.addColorStop(1,'rgba(0,0,0,1)');
  outCtx.fillStyle=vg; outCtx.fillRect(0,0,w,h); outCtx.restore();
  const fs=Math.min(w*.11,h*.17);
  outCtx.save(); outCtx.translate(w*.5,h*.5); outCtx.scale(1+0.06*envBass,1+0.06*envBass);
  outCtx.textAlign='center'; outCtx.textBaseline='middle';
  outCtx.font='300 '+fs+"px Georgia,'Times New Roman',serif";
  outCtx.shadowColor='rgba(255,140,30,'+(0.5+0.3*envBass)+')'; outCtx.shadowBlur=60+40*envBass;
  outCtx.fillStyle='rgba(255,230,180,0.12)'; outCtx.fillText(trackName,0,0);
  outCtx.shadowColor='rgba(255,200,80,'+(0.7+0.2*envMid)+')'; outCtx.shadowBlur=25+15*envMid;
  outCtx.fillStyle='rgba(255,245,220,'+(0.7+0.2*envFull)+')'; outCtx.fillText(trackName,0,0);
  outCtx.shadowBlur=0; outCtx.fillStyle='rgba(255,255,252,'+(0.92+0.08*envFull)+')'; outCtx.fillText(trackName,0,0);
  outCtx.restore();
}

// ── Live animation ────────────────────────────────────────────────────────────
let lastT=performance.now();
function tick(t){
  requestAnimationFrame(tick);
  const dt=Math.min(0.05,(t-lastT)/1000); lastT=t;
  const sensitivity=+sensEl.value, glow=+glowEl.value;
  let bass=0,mid=0,high=0,full=0;
  if(audioCtx&&analyser&&audioEl&&!audioEl.paused){
    bass=rms(aBass); mid=rms(aMid); high=rms(aHigh);
    analyser.getByteFrequencyData(freqData);
    let s=0; for(let i=0;i<freqData.length;i++){const v=freqData[i]/255;s+=v*v;}
    full=Math.sqrt(s/freqData.length);
  }
  const sm=0.09;
  envBass+=(bass-envBass)*sm; envMid+=(mid-envMid)*sm;
  envHigh+=(high-envHigh)*sm; envFull+=(full-envFull)*sm;
  const kick=Math.min(1,envBass*2.8*sensitivity);
  const energy=Math.min(1,envFull*2.2*sensitivity);
  stepPhysics(dt,kick);
  renderToTarget(displayTarget,energy,glow);
}

// ── Export (via Web Worker — main thread stays smooth) ────────────────────────
let activeWorker=null;

exportBtn.addEventListener('click', async()=>{
  if(!audioEl) return;
  if(typeof VideoEncoder==='undefined'){
    recInfoEl.textContent='Needs Chrome 94+'; return;
  }
  if(activeWorker){ activeWorker.terminate(); activeWorker=null; }

  exportBtn.disabled=true;
  progressWrap.style.display='block';

  const t0=+fromSlider.value, t1=+toSlider.value;
  const [rw,rh]=getRecordSize();
  const TARGET_SR=48000;

  setProgress(1,'Fetching audio...');
  const arrayBuf=await fetch(audioEl.src).then(r=>r.arrayBuffer());

  setProgress(4,'Decoding audio...');
  const ac=ensureAC(); if(ac.state!=='running') await ac.resume();
  const rawBuf=await ac.decodeAudioData(arrayBuf);

  setProgress(8,'Resampling...');
  const nch=Math.min(2,rawBuf.numberOfChannels);
  const offAC=new OfflineAudioContext(nch,Math.ceil((t1-t0)*TARGET_SR),TARGET_SR);
  const src=offAC.createBufferSource();
  src.buffer=rawBuf; src.connect(offAC.destination); src.start(0,t0,t1-t0);
  const resampled=await offAC.startRendering();

  // Extract PCM as transferable Float32Arrays
  const rCh0=rawBuf.getChannelData(0).slice();
  const rCh1=nch>1?rawBuf.getChannelData(1).slice():null;
  const aCh0=resampled.getChannelData(0).slice();
  const aCh1=nch>1?resampled.getChannelData(1).slice():null;
  const xfer=[rCh0.buffer,aCh0.buffer];
  if(rCh1) xfer.push(rCh1.buffer);
  if(aCh1) xfer.push(aCh1.buffer);

  setProgress(12,'Starting render worker...');
  const worker=new Worker(workerUrl);
  activeWorker=worker;

  worker.postMessage({
    rawPCM:  {ch0:rCh0, ch1:rCh1, sampleRate:rawBuf.sampleRate},
    audioPCM:{ch0:aCh0, ch1:aCh1, sampleRate:TARGET_SR, nch, length:resampled.length},
    t0, t1, fps:30, rw, rh,
    sensitivity:+sensEl.value,
    glow:+glowEl.value,
    trackName,
    blobState: blobs.map(b=>({...b})),
    initEnv: {eB:envBass, eM:envMid, eH:envHigh, eF:envFull},
  }, xfer);

  worker.onmessage = (e) => {
    const d=e.data;
    if(d.type==='progress'){ setProgress(d.pct,d.label); }
    else if(d.type==='done'){
      setProgress(100,'Saving...');
      const blob=new Blob([d.buffer],{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=trackName+'_'+rw+'x'+rh+'.webm';
      a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),15000);
      recInfoEl.textContent='Saved';
      setTimeout(()=>{ progressWrap.style.display='none'; },2000);
      exportBtn.disabled=false; activeWorker=null; worker.terminate();
    } else if(d.type==='error'){
      statusEl.textContent='Error: '+d.message;
      progressWrap.style.display='none';
      exportBtn.disabled=false; activeWorker=null; worker.terminate();
    }
  };
  worker.onerror = (e) => {
    statusEl.textContent='Worker error: '+e.message;
    progressWrap.style.display='none';
    exportBtn.disabled=false; activeWorker=null;
  };
});

function setProgress(pct,label){
  progressBar.style.width=pct+'%';
  progressLbl.textContent=label;
  statusEl.textContent=label;
}

// ── Auto-load Moment.mp3 ──────────────────────────────────────────────────────
async function autoLoadMoment(){
  try{
    const res=await fetch('base/Moment.mp3'); if(!res.ok) return;
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    audioEl=new Audio(); audioEl.crossOrigin='anonymous'; audioEl.src=url; audioEl.preload='auto';
    audioEl.addEventListener('canplay',()=>{
      setupAudio(audioEl); trackName='Moment'; onTrackReady('Moment');
    },{once:true});
    audioEl.addEventListener('ended',()=>{ statusEl.textContent='Ended'; });
  }catch(e){}
}

resize();
requestAnimationFrame(tick);
autoLoadMoment();
})();
</script>
